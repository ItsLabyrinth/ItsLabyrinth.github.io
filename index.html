<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItsLabyrinth Profile</title>
    <link rel="stylesheet" href="base.css">
    <style>
        /* This overrides the theme code to make a real website layout */
        body {
            background-color: #111214; /* Dark Discord theme color */
            color: #dbdee1;
            font-family: 'Inter', 'emoji', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .profile-card {
            background: rgba(30, 31, 34, 0.8);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        h1 { margin-bottom: 5px; color: #fff; }
        p { color: #b5bac1; }
    </style>
</head>
<body>

    <div class="profile-card">
        <h1>Welcome to ItsLabyrinth 🪄</h1>
        <p>This is my custom GitHub Pages layout.</p>
    </div>

</body>
</html>
